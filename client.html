<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>llm conversation viewer</title>
    <style>
        body { 
			font-family: sans-serif;
			line-height: 1.6; 
			padding: 20px; 
			position: relative;
			}
        a { 
			display: block; 
			margin: 10px 0; 
			font-size: 1.2em; 
			}
        pre {
			background-color: #f4f4f4;
			padding: 10px; 
			border: 1px solid #ddd; 
			white-space: pre-wrap; 
			}
		#viewport {
			width: 800px; 
			height: 600px;
			border: 1px solid black;
			overflow: hidden;
			position: relative;
		}
		#canvas { 
			width: 2000px; 
			height: auto; 
			background-color: #f0f0f0;
			position: absolute; 
			top: 0; 
			left: 0px;
			cursor: grab; 
			transform: translate(0px, 0px);
			transform-origin: 0 0;
			display:flow;
		}
		.cavblock { 
			position:relative;
			width: 1998px; 
			height: 1498px; 
			border: 2px dashed blue;
			display:block;
		}
		.svg-layer {
			position: absolute;
			top:0px;
			left: 0px;
			pointer-events: none; 
			z-index:1;
		}
		.node-layer {
			position: absolute;
			top:0px;
			left: 0px;
			width: 100%;
			height: 100%;
			pointer-events: none; 
			z-index:1;
		}
		
		.node {
			position: absolute;
			height:24px;
			background-color: white;
			border: 1px solid #333;
			padding: 10px 15px;
			border-radius: 5px;
			text-align: center;
			font-family: Times New Roman;
			font-size:16px;
			pointer-events: all; 
			cursor: pointer;
			user-select: none; 
		}
		.node:hover {
			border-color: #007bff;
			box-shadow: 0 0 5px rgba(0,123,255,0.5);
		}
		.node.active {
			background-color: #007bff; 
			color: white;
			border-color: #0056b3;

		}
		.loadBtn {
			position: absolute;
			left:2px;
			width:20px;
			height:20px;
			background-color: #ffe2e2;
			border: 1px solid #fd0000;
			box-shadow: 0 0 5px #ff000080;
			padding: 10px 10px;
			border-radius: 20px;
			font-weight:900;
			text-align: center;
			font-family: Arial;
			font-size:16px;
			pointer-events: all;
			cursor: pointer;
			user-select: none;
			
		}
		.loadBtn:hover {
			border-color: #007bff;
			box-shadow: 0 0 5px rgba(0,123,255,0.5);
			cursor: pointer;
		}
		.loadBtn.Loading{
			background: repeating-linear-gradient(
			45deg,
			#f0f0f0,
			#f0f0f0 10px,
			#bdbdbd 10px,
			#bdbdbd 20px
			);
			cursor: wait;
			box-shadow: 0 0 5px #56565680;
			cursor: pointer;
		}
		.loadBtn.afterLoad{
			background-color: #dff6df;
			border: 1px solid #178703;
			box-shadow: inset 0 0 5px 3px #05bf0080;
		}
		
		.svg-layer line,path {
			stroke: #333;
			stroke-width: 2px;
			fill:none
		}
		.roleInCan{
			position: absolute;
			top:0;
			left:0;
			z-index:1;
			width:15px;
			Height:15px;
			background-color:gray;
			border-radius: 3px;
		
		}
		.overlay{
			position:absolute;
			top:0px;
			left:0px;
			width:100%;
			height:100%;
			max-width: 850px;
			max-height: 1000px;
			background: repeating-linear-gradient(
				45deg,
				#f0f0f080,
				#f0f0f080 10px,
				#bdbdbd80 10px,
				#bdbdbd80 20px
			);
			cursor: wait;
			z-index:10;
		}
		#Responsearea{
			width: 100%;
			max-width:830px;
			height: auto;
			min-height: 25px;
			border: 2px solid navy;
			border-radius: 5px 5px 0 5px;
			border-bottom: 1px solid gray;
		}
		#Responsemodel{
			position: absolute;
			background-color:lightgrey;
			left: min(62%,510px); 
			right:4px;
			max-width: 328px;
			height: 20px; 
			border: 2px solid #a5a3a3;
			clip-path: polygon(0% 0%,100% 0%,100% 100%,5% 100%);
			border-bottom: 2px solid navy;
			border-right: 2px solid navy;
			border-radius: 0 0 5px 20px;
			white-space: pre-wrap;
		}
		.Blockspan{
			position:absolute;
			top:45px;
			left:8px;
			font-family: Arial;
			font-size:24px;
			font-weight:700;
			color: slategrey;
			writing-mode:vertical-lr;
		}
</style>
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-highlight/lib/index.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
</head>
<body>
	<div id="layerdiv" style="max-width:835px">
	<div id="Nodemenu" style="display: flex;max-width:835px">
		<div id="viewport">
			<div id="canvas">
			</div>
		</div>
		<div id="addArea" style="padding: 10px;border: 1px solid rebeccapurple;display: none;font-size: 2px;">
			<textarea id="contentToAdd" style="margin: 10px;width: 270px;height: 400px;display: block;"></textarea>
			<textarea id="modelToAdd" placeholder="modelName" style="margin: 10px;width: 270px;height: 50px;display: block;"></textarea>
			<select id="roleToAdd" style="margin-left:10px;width: 80px;" required>
				<option value="">Role</option>
				<option value="system">System</option>
				<option value="user">User</option>
				<option value="assistant">Assistant</option>
			</select>
			<input disabled type="checkbox" id="subTreeAddBtn" style="margin:0px" checked=true/>
			<span style="font-family: Arial;font-size:10px;">new Subtree</span>
			<button id="addNodebutton" style="font-size:11px;padding-left:1px;padding-right:1px" onclick="sendCoordinate_thenAction('append');">add node</button>
			<button disabled id="deleteNodebutton" style="font-size:11px;padding-left:1px;padding-right:1px" onclick="sendCoordinate_thenAction('delete');">delete subtree</button>
			
		</div>
		<button id="expand&fold" onclick="checkExpOrFold();" style="background-color:#e9e9e9"><<</button>
	</div>
	<div id="Responsearea"></div>
	<div id="Responsemodel"></div>
	<div id="OprateMenu" style="display: flex; align-items: center">
	<textarea id="msgTextarea" style="margin: 10px;max-width:450px;width: 60%;height: 80px;"></textarea>
	<button id="submitbutton" onclick="sendCoordinate_thenAction('submit');">send</button>
	<button id="savebutton" onclick="saveJSON();">save</button>
	<button disabled id="displybutton" onclick="sendCoordinate_thenAction('display');" style='width:88px'>view node</button>
	<input id="modelArea" placeholder="modelName" list="predefined_models" style="width:30%"></input> 
	<datalist id="predefined_models">
	  <option value="google/gemini-3-flash-preview"></option>
	  <option value="google/gemini-3.1-pro-preview"></option>
	  <option value="google/gemini-3.1-flash-lite-preview"></option>
	</datalist>	
	</div>
	</div>
    <script src="/public/client.js"></script>
</body>
</html>
